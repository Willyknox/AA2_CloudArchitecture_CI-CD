apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: temperaturas-backend
  template:
    metadata:
      labels:
        app: temperaturas-backend
    spec:
      containers:
        - name: temperaturas-backend
          image: YOUR_IMAGE_BACKEND
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: temperaturas-backend-service
spec:
  selector:
    app: temperaturas-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: temperaturas-frontend
  template:
    metadata:
      labels:
        app: temperaturas-frontend
    spec:
      containers:
        - name: temperaturas-frontend
          image: YOUR_IMAGE_FRONTEND
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: TEMP_SERVER
              value: "temperaturas-backend-service:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend-service
spec:
  selector:
    app: temperaturas-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: LoadBalancer
